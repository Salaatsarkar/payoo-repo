<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Payoo | Get-Bonus Page</title>
      <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

      <!-- tailwind + daisy -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

      <!-- google fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

      <!-- fontawesome cdn icons -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />

      <style>
            * {
                  font-family: "Outfit", sans-serif;
            }
      </style>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto pb-30">
<!-- header section with logo -->
 <header class="border-b-2 border-gray-300">
      <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <!-- left part start -->
            <div class="left flex">
                  <div class="logo w-[60px]">
                        <img src="./assets/logo.png" alt="logo">
                  </div>
                  <div class="balance-info">
                        <h2 class="text-2xl font-bold ">$<span id="balance">45000</span></h2>
                        <p class="text-neutral/50">Available Balance</p>
                  </div>
            </div>
             <!-- left part end -->

             <!-- right part start -->
            <div class="right">
                  <a href="/index.html" class="btn btn-soft text-neutral/50"><i class="fa-solid fa-right-from-bracket rotate-180"></i> LogOut</a>
            </div>
            <!-- right part end -->
      </section>
 </header>
 <!-- header section end -->

  <!-- welcome section start -->
   <section class="w-11/12 mx-auto py-10 space-y-5">
      <h1 class="text-2xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h1>
      <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and</p>
       <!-- button start -->
      <div class="buttons py-10 grid grid-cols-3 gap-3">
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                  <img src="./assets/opt-1.png" alt="addMoney">
                  <p>Add Money</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                  <img src="./assets/opt-2.png" alt="cashOut">
                  <p>Cashout</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                  <img src="./assets/opt-3.png" alt="transferMoney">
                  <p>Transfer Money</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                  <img src="./assets/opt-4.png" alt="getBonus">
                  <p>Get Bonus</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                  <img src="./assets/opt-5.png" alt="payBill">
                  <p>Pay Bill</p>
            </button>
            <button class="btn btn-primary btn-soft flex-col h-full py-4">
                  <img src="./assets/opt-6.png" alt="transactions">
                  <p>Transactions</p>
            </button>
      </div>
        <!-- button end -->
   </section>
      <!-- welcome section end -->

      <!-- get bonus form section -->
       <section class="get-bonus form w-11/12 mx-auto">
            <h2 class="text-2xl font-bold">Get Bonus</h2>

            <div class="form pt-5  max-w-sm mx-auto ">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                  <div class="card-body">
                        <fieldset class="fieldset">
                              <label class="label font-bold text-neutral">Enter Bonus Coupon</label>
                              <input id="bonus-coupon" type="text" maxlength="11" minlength="11" class="input rounded-full bg-base-200 w-full" placeholder="Enter your coupon"  />
                              <button id="bonus-btn" class="btn btn-primary mt-4 rounded-full font-semibold w-full">Get Bonus</button>
                        </fieldset>
                  </div>
            </div>

      </div>

       </section>
       <!-- get-bonus section end -->
</body>
</html>
